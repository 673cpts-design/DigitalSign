	<!--------------------- video wallpaper --------------------------------------->
<div id="vid-bg">
  <video id="video" muted loop playsinline preload="auto" autoplay>
    <source src="videos/1hour.webm" type="video/webm">
    <!-- Optional fallback:
    <source src="flagb4.mp4" type="video/mp4">
    -->
  </video>

  <script>
    (function () {
      const video = document.getElementById('video');

      let playbackConfirmed = false;
      let lastTime = -1;
      let stallCount = 0;
      let retryTimer = null;

      function log(msg, extra) {
        if (extra !== undefined) {
          console.log('[video]', msg, extra);
        } else {
          console.log('[video]', msg);
        }
      }

      async function forcePlay() {
        try {
          video.muted = true;
          video.defaultMuted = true;
          video.playsInline = true;
          video.autoplay = true;

          const promise = video.play();
          if (promise !== undefined) {
            await promise;
          }

          playbackConfirmed = true;
          log('Playback started:', video.currentSrc || 'no currentSrc');
        } catch (err) {
          playbackConfirmed = false;
          log('Playback attempt failed:', err);
        }
      }

      function scheduleRetry() {
        if (retryTimer) return;

        retryTimer = setInterval(async () => {
          if (!playbackConfirmed || video.paused || video.readyState < 3) {
            log('Retrying playback...');
            await forcePlay();
          }

          if (playbackConfirmed && !video.paused) {
            clearInterval(retryTimer);
            retryTimer = null;
          }
        }, 1000);
      }

      function reloadAndPlay() {
        log('Reloading video source...');
        playbackConfirmed = false;
        video.load();
        scheduleRetry();
        forcePlay();
      }

      // Kick off after DOM is ready (important for Edge kiosk now)
      if (document.readyState === 'complete') {
        forcePlay();
        scheduleRetry();
      } else {
        window.addEventListener('load', () => {
          log('Window loaded, starting video...');
          forcePlay();
          scheduleRetry();
        });
      }

      video.addEventListener('canplay', () => {
        log('canplay fired');
        forcePlay();
      });

      video.addEventListener('playing', () => {
        playbackConfirmed = true;
        log('playing fired');
      });

      video.addEventListener('pause', () => {
        log('pause fired');
        scheduleRetry();
      });

      video.addEventListener('stalled', () => {
        log('stalled fired');
        reloadAndPlay();
      });

      video.addEventListener('waiting', () => {
        log('waiting fired');
        scheduleRetry();
      });

      video.addEventListener('error', () => {
        const mediaError = video.error;
        log('video error fired', mediaError ? {
          code: mediaError.code,
          message: mediaError.message || 'no message'
        } : 'unknown error');
        reloadAndPlay();
      });

      // Stall detection watchdog
      setInterval(() => {
        if (video.readyState >= 2 && !video.paused && !video.ended) {
          if (video.currentTime === lastTime) {
            stallCount++;
            log('Detected playback stall #' + stallCount);

            if (stallCount >= 2) {
              reloadAndPlay();
              stallCount = 0;
            }
          } else {
            stallCount = 0;
          }

          lastTime = video.currentTime;
        } else if (video.paused) {
          scheduleRetry();
        }
      }, 3000);

      // Handle kiosk visibility quirks
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          log('Visibility returned, forcing playback');
          forcePlay();
          scheduleRetry();
        }
      });
    })();
  </script>
